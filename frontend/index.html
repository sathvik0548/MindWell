<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="MindWell – Your calm digital companion for mental health awareness, mood tracking, and well-being guidance." />
  <title>MindWell – Mental Health &amp; Well-being Platform</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="src/styles.css" />

  <div id="app">

  <!-- Three.js from CDN -->

  <script type="module" src="/src/main.js"></script>
